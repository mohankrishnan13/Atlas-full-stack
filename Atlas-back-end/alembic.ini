# ══════════════════════════════════════════════════════════════════════════════
# alembic.ini — ATLAS Alembic Configuration
#
# IMPORTANT: sqlalchemy.url is intentionally left blank here.
# The URL is injected dynamically in alembic/env.py by reading the
# DATABASE_URL_SYNC environment variable.  This ensures the same .env
# that Docker Compose reads is the single source of truth — no hardcoded
# credentials in source control.
# ══════════════════════════════════════════════════════════════════════════════

[alembic]
# Path to the migration scripts directory
script_location = alembic

# Prepend the project root to sys.path so `from app.models...` works
prepend_sys_path = .

# Migration filename template
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Leave blank — URL is set programmatically in env.py from the environment
sqlalchemy.url =

version_path_separator = os

# ── Logging ───────────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
