# ATLAS SOC Dashboard — Development Docker Compose
# Runs: PostgreSQL + ATLAS FastAPI Backend
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f atlas  # Stream backend logs
#   docker-compose down -v        # Stop and remove volumes

# ═══════════════════════════════════════════════════════════════════════
# ATLAS SOC Dashboard — Docker Compose
#
# Default mode: DEVELOPMENT
#  - FastAPI auto-reload
#  - Source code mounted
#  - PostgreSQL exposed
#
# To switch to PRODUCTION:
#  1. Replace Dockerfile.dev with Dockerfile
#  2. Remove the source code mount
#  3. Change port from 8010 → 8000
#  4. Remove PostgreSQL external port
#  5. Use multiple workers in Dockerfile
#
# Run:
#   docker compose up
#
# Stop:
#   docker compose down
#
# Remove DB volume:
#   docker compose down -v
# ═══════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Enable PL/pgSQL for advanced stored procedures (future use)
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"

    # DEV: allow connecting from host (psql, DBeaver etc)
    ports:
      - "5432:5432"

    # PROD: remove this block so DB is internal only
    # ports:
    #   - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

      # Optional DB bootstrap script
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── ATLAS Backend ───────────────────────────────────────────────────────────
  atlas:

    # DEV: build hot-reload container
    build:
      context: .
      dockerfile: Dockerfile.dev

    # PROD: switch to production Dockerfile
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    container_name: atlas-backend
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    # DEV port (matches Dockerfile.dev uvicorn port)
    ports:
      - "8010:8010"

    # PROD port (uncomment and remove DEV port above)
    # ports:
    #   - "8000:8000"

    # Load environment variables
    env_file:
      - .env

    volumes:

      # DEV: mount source code for hot reload
      - .:/app

      # PROD: remove the line above completely

      # Shared logs
      - ./data/logs:/app/data/logs:ro

    healthcheck:

      # DEV health endpoint
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]

      # PROD: change to
      # test: ["CMD", "curl", "-f", "http://localhost:8000/health"]

      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Persistent Volumes ───────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local