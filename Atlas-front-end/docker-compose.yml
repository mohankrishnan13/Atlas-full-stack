# ═══════════════════════════════════════════════════════════════════════════════
# ATLAS SOC Dashboard — Frontend Docker Compose
#
# Default Mode: DEVELOPMENT
#   • Next.js hot reload
#   • Source mounted into container
#   • No rebuild required on code change
#
# Switch to PRODUCTION:
#   1. Change Dockerfile.dev → Dockerfile
#   2. Remove source code volume mount
#   3. Set NODE_ENV=production
#   4. Keep build args for backend URL
#
# Start:
#   docker compose up
#
# Stop:
#   docker compose down
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── ATLAS Next.js Frontend ──────────────────────────────────────────────────
  atlas-fe:

    # DEV: build using development Dockerfile (hot reload)
    build:
      context: .
      dockerfile: Dockerfile.dev

    # PROD: use optimized production Dockerfile
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   args:
    #     NEXT_PUBLIC_ATLAS_BACKEND_URL: http://localhost:8000

    container_name: atlas-frontend
    restart: unless-stopped

    ports:
      - "3000:3000"

    # DEV environment
    environment:
      NODE_ENV: development
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_ATLAS_BACKEND_URL: http://localhost:8010

    # PROD environment (uncomment for production)
    # environment:
    #   NODE_ENV: production
    #   PORT: "3000"
    #   HOSTNAME: "0.0.0.0"
    #   NEXT_PUBLIC_ATLAS_BACKEND_URL: http://localhost:8000

    volumes:

      # DEV: mount source code for hot reload
      - .:/app

      # Prevent host node_modules from overriding container modules
      - /app/node_modules

    # PROD: remove the volumes block completely
    # volumes:
    #   - .:/app