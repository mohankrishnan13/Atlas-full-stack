# ═══════════════════════════════════════════════════════════════════════════════
# ATLAS SOC Dashboard — Unified Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
#
# FOLDER STRUCTURE EXPECTED:
#
#   Atlas-full-stack/                        ← run docker compose from HERE
#   ├── docker-compose.yml              ← this file
#   ├── Atlas-back-end/       ← backend source (extracted from zip)
#   │   ├── app/
#   │   ├── data/logs/
#   │   ├── Dockerfile
#   │   └── requirements.txt
#   └── Atlas-front-end/             ← frontend source (extracted from zip)
#       ├── src/
#       ├── package.json
#       └── Dockerfile
#
# USAGE:
#   docker compose up --build           # first time (or after code changes)
#   docker compose up -d                # subsequent starts (detached)
#   docker compose logs -f              # stream all logs
#   docker compose logs -f atlas-frontend atlas-backend  # specific services
#   docker compose down                 # stop (keep volumes)
#   docker compose down -v              # stop and wipe the database
#
# SERVICES:
#   postgres         → internal only, port 5432 not exposed to host
#   atlas-backend    → http://localhost:8000  (FastAPI + Swagger at /docs)
#   atlas-frontend   → http://localhost:3000  (Next.js dashboard)
#
# DEFAULT LOGIN CREDENTIALS (printed in backend logs on first boot):
#   admin@atlas.com   /  AtlasAdmin1!   (Admin)
#   analyst@atlas.com /  Analyst123!    (Analyst)
#   audit@atlas.com   /  ReadOnly123!   (Read-Only)
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL (Internal Only) ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    restart: unless-stopped

    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - atlas-network

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M


  # ── Backend (FastAPI) ────────────────────────────────────────
  atlas-backend:
    build:
      context: ./Atlas-back-end
      dockerfile: Dockerfile

    container_name: atlas-backend
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    volumes:
      - backend_logs:/app/data/logs

    ports:
      - "8000:8000"  # expose only backend API

    command: >
      sh -c "
      echo '⏳ Waiting for DB...' &&
      until pg_isready -h postgres -U $POSTGRES_USER; do
        sleep 2;
      done &&
      echo '🚀 Running migrations...' &&
      alembic upgrade head &&
      echo '🔥 Starting API...' &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-2}
      "

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

    networks:
      - atlas-network
    
    extra_hosts:
      - "host.docker.internal:host-gateway"

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M


  # ── Frontend (Next.js) ───────────────────────────────────────
  atlas-frontend:
    build:
      context: ./Atlas-front-end
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ATLAS_BACKEND_URL: http://atlas-backend:8000

    container_name: atlas-frontend
    restart: unless-stopped

    depends_on:
      atlas-backend:
        condition: service_healthy

    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_ATLAS_BACKEND_URL: http://atlas-backend:8000

    ports:
      - "3000:3000"

    networks:
      - atlas-network

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M


  # ── Reverse Proxy (Nginx) ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: atlas-nginx
    restart: unless-stopped

    depends_on:
      - atlas-frontend
      - atlas-backend

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    networks:
      - atlas-network

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M


# ── Volumes ───────────────────────────────────────────────────
volumes:
  postgres_data:
  backend_logs:


# ── Network ───────────────────────────────────────────────────
networks:
  atlas-network:
    driver: bridge