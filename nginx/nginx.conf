# ══════════════════════════════════════════════════════════════════════════════
# nginx/nginx.conf — ATLAS Reverse Proxy
#
# Routes all traffic through port 80:
#   /api/*          → atlas-backend:8000   (FastAPI REST endpoints)
#   /docs           → atlas-backend:8000   (Swagger UI)
#   /redoc          → atlas-backend:8000   (ReDoc UI)
#   /health         → atlas-backend:8000   (health check endpoint)
#   /anomalies*     → atlas-backend:8000   (anomaly engine REST)
#   /               → atlas-frontend:3000  (Next.js dashboard — everything else)
#
# The docker-compose healthcheck for this container hits /health through nginx,
# so the backend must be up before nginx reports healthy.
# ══════════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;

    # ── Upstream definitions ──────────────────────────────────────────────────
    # Use Docker service names — they resolve to the container IP on atlas-network.
    upstream atlas_backend {
        server atlas-backend:8000;
        keepalive 32;
    }

    upstream atlas_frontend {
        server atlas-frontend:3000;
        keepalive 32;
    }

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;   # match any hostname

        # Maximum upload size (for log ingestion batches)
        client_max_body_size 50M;

        # ── Proxy headers forwarded to upstream services ──────────────────────
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # ── Timeouts ──────────────────────────────────────────────────────────
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # ── Backend routes ────────────────────────────────────────────────────
        # All FastAPI routes: REST API, auth, dashboard data, Swagger
        location /api/ {
            proxy_pass http://atlas_backend;
        }

        location /docs {
            proxy_pass http://atlas_backend;
        }

        location /redoc {
            proxy_pass http://atlas_backend;
        }

        location /health {
            proxy_pass http://atlas_backend;
            # No access log for health checks (reduces noise)
            access_log off;
        }

        location /anomalies {
            proxy_pass http://atlas_backend;
        }

        location /openapi.json {
            proxy_pass http://atlas_backend;
        }

        # ── Frontend routes ───────────────────────────────────────────────────
        # Everything else goes to Next.js, including Next.js internals (_next/*)
        location / {
            proxy_pass http://atlas_frontend;

            # Required for Next.js hot-reload WebSocket in development
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Error pages ───────────────────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error":"Service temporarily unavailable","status":503}';
            add_header Content-Type application/json;
        }
    }
}
